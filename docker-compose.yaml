services:
  grafana:
    user: root
    container_name: 'teosibileau-leafletchoropleth-panel'

    build:
      context: .docker
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana-enterprise}
        grafana_version: ${GRAFANA_VERSION:-12.4.0}
    ports:
      - 3000:3000/tcp
    volumes:
      - ./dist:/var/lib/grafana/plugins/teosibileau-leafletchoropleth-panel
      - ./.docker/provisioning:/etc/grafana/provisioning
      - .:/root/teosibileau-leafletchoropleth-panel

    environment:
      NODE_ENV: development
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_BASIC_ENABLED: 'false'
      GF_DEFAULT_APP_MODE: development
      GF_LOG_FILTERS: plugin.teosibileau-leafletchoropleth-panel:debug
      GF_LOG_LEVEL: debug
      GF_DATAPROXY_LOGGING: 1
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: teosibileau-leafletchoropleth-panel
