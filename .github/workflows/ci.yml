name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-dist
          path: dist/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:ci

  plugin-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: plugin-dist
          path: dist/
      - name: Start Grafana
        run: |
          docker run -d --name grafana-plugin-check \
            -p 3000:3000 \
            -v ${{ github.workspace }}/dist:/var/lib/grafana/plugins/teosibileau-leafletchoropleth-panel \
            -e GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=teosibileau-leafletchoropleth-panel \
            grafana/grafana-enterprise:12.4.0
      - name: Wait for Grafana to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000/api/health | jq -e '.database == "ok"' > /dev/null 2>&1; then
              echo "Grafana is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Grafana failed to start"
          exit 1
      - name: Verify plugin is loaded
        run: |
          curl -s -u admin:admin http://localhost:3000/api/plugins | jq -e 'map(select(.id? == "teosibileau-leafletchoropleth-panel")) | length > 0'
      - name: Stop Grafana
        if: always()
        run: docker rm -f grafana-plugin-check
