name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-dist
          path: dist/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:ci

  plugin-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: plugin-dist
          path: dist/
      - name: Start Grafana
        run: docker compose up -d
      - name: Wait for Grafana to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000/api/health | grep -q '"database":"ok"'; then
              echo "Grafana is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Grafana failed to start"
          exit 1
      - name: Verify plugin is loaded
        run: |
          curl -s http://localhost:3000/api/plugins | grep -q 'teosibileau-leafletchoropleth-panel'
      - name: Stop Grafana
        if: always()
        run: docker compose down
