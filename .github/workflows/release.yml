name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Package plugin
        run: |
          mv dist teosibileau-leafletchoropleth-panel
          cp -r .docker/grafana/provisioning teosibileau-leafletchoropleth-panel/provisioning
          mkdir -p teosibileau-leafletchoropleth-panel/influxdb-init
          cp .docker/influxdb/init.sh teosibileau-leafletchoropleth-panel/influxdb-init/
          cat > teosibileau-leafletchoropleth-panel/docker-compose.yaml << 'COMPOSE'
          services:
            influxdb:
              image: influxdb:1.8
              ports:
                - 8086:8086
              volumes:
                - influxdb-data:/var/lib/influxdb
                - ./influxdb-init:/docker-entrypoint-initdb.d
              environment:
                INFLUXDB_DB: rio_negro

            grafana:
              image: grafana/grafana-enterprise:12.4.0
              ports:
                - 3000:3000
              volumes:
                - .:/var/lib/grafana/plugins/teosibileau-leafletchoropleth-panel
                - ./provisioning:/etc/grafana/provisioning
              environment:
                GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
                GF_AUTH_ANONYMOUS_ENABLED: "true"
                GF_AUTH_BASIC_ENABLED: "false"
                GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: teosibileau-leafletchoropleth-panel
              depends_on:
                - influxdb

          volumes:
            influxdb-data:
          COMPOSE
          zip -r teosibileau-leafletchoropleth-panel-${GITHUB_REF_NAME}.zip teosibileau-leafletchoropleth-panel

      - name: Validate plugin
        run: pnpm dlx @grafana/plugin-validator@latest -sourceCodeUri file://. teosibileau-leafletchoropleth-panel-${GITHUB_REF_NAME}.zip

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: teosibileau-leafletchoropleth-panel-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: teosibileau-leafletchoropleth-panel-*.zip
